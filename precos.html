<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Planos | AudioType</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 50px; }
        .pricing-container { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .card { background: #161b22; padding: 30px; border-radius: 10px; border: 1px solid #30363d; width: 250px; }
        .price { font-size: 2rem; font-weight: bold; margin: 20px 0; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Escolha seu plano e acelere sua carreira</h1>
    <div class="pricing-container">
        <div class="card">
            <h3>Mensal</h3>
            <div class="price">R$ 9,90</div>
            <button>Assinar</button>
        </div>
        <div class="card">
            <h3>Semestral</h3>
            <div class="price">R$ 29,90</div>
            <button>Assinar</button>
        </div>
        <div class="card">
            <h3>Anual</h3>
            <div class="price">R$ 49,90</div>
            <button>Assinar</button>
        </div>
    </div>
    
    <a href="index.html" style="color: #58a6ff;">&larr; Voltar para a Home</a>
</body>
</html>
