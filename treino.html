<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AudioType | Área de Treino Profissional</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b0e14; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 30px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .work-area { flex: 3; display: flex; flex-direction: column; gap: 20px; }
        .sidebar { flex: 1; background: #161b22; border: 1px solid #30363d; display: flex; justify-content: center; align-items: center; min-height: 300px; }
        textarea { flex: 1; background: #0b0e14; color: #fff; border: 1px solid #30363d; padding: 20px; font-size: 16px; border-radius: 8px; }
        .player-box { background: #161b22; padding: 20px; border-radius: 8px; text-align: center; }
        .btn-submit { background: #238636; color: #fff; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="logoaudiotype.png" alt="Logo AudioType" style="height: 50px; cursor: pointer;">
        </a>
        <div><a href="index.html" style="color: #fff; text-decoration: none;">Sair do Treino</a></div>
    </header>

    <div class="main-container">
        <div class="work-area">
            <div class="player-box">
                <p>Áudio de Treino #01</p>
                <audio controls style="width: 100%; max-width: 500px;"></audio>
            </div>
            <textarea placeholder="Digite a transcrição aqui..."></textarea>
            <button class="btn-submit">ENVIAR E VERIFICAR</button>
        </div>
        <div class="sidebar">
            <p style="color: #8b949e;">Espaço para Anúncios</p>
        </div>
    </div>
</body>
</html>
