<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login | AudioType</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #161b22; padding: 40px; border-radius: 8px; border: 1px solid #30363d; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0b0e14; color: #fff; border: 1px solid #30363d; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Entrar</h2>
        <input type="email" placeholder="E-mail">
        <input type="password" placeholder="Senha">
        <br><br>
        <button style="width: 100%; padding: 10px; background: #238636; color: #fff; border: none; cursor: pointer;">Entrar</button>
    </div>
</body>
</html>
