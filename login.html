<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login | AudioType</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #161b22; padding: 40px; border-radius: 8px; border: 1px solid #30363d; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e14; color: #fff; border: 1px solid #30363d; border-radius: 4px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: #238636; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .btn-google { width: 100%; padding: 12px; background: #ffffff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="margin-top: 0;">Entrar no AudioType</h2>
        
        <!-- Botão Google -->
        <button class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style="width: 18px;">
            Continuar com Google
        </button>
        
        <p style="color: #8b949e; margin: 20px 0;">ou</p>
        
        <input type="email" placeholder="E-mail">
        <input type="password" placeholder="Senha">
        <button class="btn-main">Entrar com e-mail</button>
        
        <a href="index.html" style="color: #58a6ff; text-decoration: none; font-size: 0.9rem;">Voltar para a Home</a>
    </div>
</body>
</html>
