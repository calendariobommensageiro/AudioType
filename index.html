<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioType - O som que vira texto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f5f6f8;
            color: #333333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px 80px 20px;
        }

        .portal-container {
            background: #ffffff;
            width: 100%;
            max-width: 850px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef0f3;
        }

        /* Topo Organizado */
        .portal-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f5f6f8;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            margin-bottom: 10px;
        }

        .text-logo {
            font-size: 36px;
            font-weight: 800;
            color: #0b1a30;
        }

        .text-logo span {
            color: #00b4d8;
        }

        .main-banner {
            background: linear-gradient(135deg, #003366 0%, #00a8cc 100%);
            color: #ffffff;
            padding: 35px 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .banner-tag {
            background: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .banner-title {
            font-size: 24px;
            font-weight: 700;
        }

        .cards-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .exercise-card {
            background: #fdfdfd;
            border: 1px solid #eef0f3;
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .card-tag-livre { color: #00a8cc; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .card-tag-premium { color: #006699; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a3a;
            margin-bottom: 20px;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-green { background-color: #2ecc71; color: white; }
        .btn-blue { background-color: #0077b6; color: white; }
        .btn-action:hover { opacity: 0.9; }

        .filter-section {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: center;
            margin-top: 25px;
        }

        .select-custom {
            width: 100%;
            padding: 14px;
            border: 1px solid #dcdfe4;
            border-radius: 10px;
            font-size: 14px;
            color: #495057;
            background-color: #ffffff;
        }

        .btn-filter {
            background-color: #002244;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Área de Transcrição Interativa */
        .workspace-section {
            background: #fafbfc;
            border: 1px dashed #00b4d8;
            border-radius: 16px;
            padding: 30px;
            margin-top: 25px;
        }

        .audio-player-wrapper {
            margin-bottom: 20px;
            text-align: center;
        }

        audio {
            width: 100%;
            max-width: 500px;
        }

        .transcription-textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #dcdfe4;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 15px;
        }

        .transcription-textarea:focus {
            border-color: #0077b6;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
        }

        .result-success { background-color: #e8f8f0; color: #1e7e34; border: 1px solid #c3e6cb; }

        .portal-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eef0f3;
            font-size: 12px;
        }

        .portal-footer a {
            color: #6c757d;
            text-decoration: none;
            margin: 0 10px;
        }

        .portal-footer a:hover { text-decoration: underline; }

        /* BARRA DE COOKIES */
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, #003366 0%, #00a8cc 100%); 
            color: #ffffff;
            padding: 20px 40px;
            z-index: 99999;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
        }

        .cookie-content {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .cookie-text strong {
            display: block;
            font-size: 18px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .cookie-text p {
            font-size: 13px;
            color: #ffffff;
            line-height: 1.5;
        }

        .cookie-buttons {
            display: flex;
            gap: 15px;
            flex-shrink: 0;
        }

        .btn-cookie-opt {
            background: #ffffff;
            color: #003366;
            border: none;
            padding: 12px 24px;
            border-radius: 12px; 
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-cookie-accept {
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            padding: 12px 28px;
            border-radius: 12px; 
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4);
        }

        .btn-cookie-opt:hover { background: #eef2f7; }
        .btn-cookie-accept:hover { background-color: #27ae60; }

        @media (max-width: 768px) {
            .cards-container, .filter-section { grid-template-columns: 1fr; }
            .cookie-banner { padding: 20px; }
            .cookie-content { flex-direction: column; align-items: flex-start; gap: 20px; }
            .cookie-buttons { width: 100%; flex-direction: column; gap: 10px; }
            .btn-cookie-opt, .btn-cookie-accept { width: 100%; text-align: center; padding: 14px; }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        
        <!-- Cabeçalho Definitivo -->
        <header class="portal-header">
            <div class="logo-wrapper">
                <img src="logoaudiotype.png" alt="AudioType - O som que vira texto" class="logo-img" id="realLogo" style="max-width: 280px; height: auto;" onerror="this.style.display='none'; document.getElementById('fallbackText').style.display='block';">
                
                <div id="fallbackText" style="display: none;">
                    <div class="text-logo">Audio<span>Type</span></div>
                    <p style="color: #6c757d; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; font-weight: 600;">O som que vira texto</p>
                </div>
            </div>
        </header>

        <!-- Banner Principal -->
        <div class="main-banner">
            <span class="banner-tag">Treino Sugerido</span>
            <div class="banner-title">Resumo de Negócios (PT-BR)</div>
        </div>

        <!-- Cards Horizontais -->
        <div class="cards-container">
            <div class="exercise-card">
                <div>
                    <div class="card-tag-livre">Nível Livre</div>
                    <div class="card-title">Ditado para Iniciantes</div>
                </div>
                <!-- Chamar a função de abrir o exercício -->
                <button class="btn-action btn-green" onclick="abrirTreinoGratis()">▶ Começar Treino Grátis</button>
            </div>

            <div class="exercise-card">
                <div>
                    <div class="card-tag-premium">Premium</div>
                    <div class="card-title">Selo de Proficiência</div>
                </div>
                <!-- Link de checkout de vendas fictício (Substitua depois pelo seu link Hotmart/Kiwify) -->
                <button class="btn-action btn-blue" onclick="window.open('https://hotmart.com', '_blank')">🔒 Emitir Certificado Pró</button>
            </div>
        </div>

        <!-- Área de Transcrição Interativa (Fica oculta até clicar no botão) -->
        <div class="workspace-section" id="workspaceTreino" style="display: none;">
            <h3 style="color: #0b1a30; margin-bottom: 15px;">🎧 Exercício: Ditado para Iniciantes</h3>
            
            <div class="audio-player-wrapper">
                <!-- Arquivo de áudio. Substitua 'audio-demonstracao.mp3' pelo nome do seu arquivo real -->
                <audio id="treinoAudio" controls controlsList="nodownload">
                    <source src="audio-demonstracao.mp3" type="audio/mpeg">
                    Seu navegador não suporta o player de áudio.
                </audio>
            </div>

            <textarea id="userTranscription" class="transcription-textarea" placeholder="Ouça o áudio acima com atenção e digite aqui exatamente o que for dito..."></textarea>
            
            <button class="btn-action btn-blue" onclick="verificarTranscricao()">✔ Verificar Resultado</button>
            
            <div id="resultadoValidacao" class="result-box result-success"></div>
        </div>

        <!-- Linha de Filtros -->
        <div class="filter-section" id="secaoFiltros">
            <select class="select-custom"><option>[ Selecionar Nível / Velocidade ]</option></select>
            <select class="select-custom"><option>[ Tipo de Áudio / Contexto ]</option></select>
            <button class="btn-filter">Filtrar</button>
        </div>

        <!-- Links para políticas -->
        <footer class="portal-footer">
            <a href="politicas.html#privacidade">Política de Privacidade</a> | 
            <a href="politicas.html#termos">Termos de Uso</a>
        </footer>

    </div>

    <!-- Container da barra de cookies -->
    <div id="cookieContainer"></div>

    <script>
        // Texto original correto que o aluno deve acertar (Mude quando trocar o áudio)
        const textoCorreto = "o som que vira texto";

        function abrirTreinoGratis() {
            // Mostra o painel de treino e rola até ele
            var workspace = document.getElementById('workspaceTreino');
            workspace.style.display = 'block';
            workspace.scrollIntoView({ behavior: 'smooth' });
        }

        function verificarTranscricao() {
            var userInput = document.getElementById('userTranscription').value.trim().toLowerCase();
            var resultadoDiv = document.getElementById('resultadoValidacao');
            
            // Limpa pontuações simples para comparar puramente as palavras
            var textoLimpoUsuario = userInput.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
            var textoLimpoAlvo = textoCorreto.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

            if (textoLimpoUsuario === textoLimpoAlvo) {
                resultadoDiv.className = "result-box result-success";
                resultadoDiv.innerHTML = "🎉 Excelente! Você transcreveu 100% corretamente.";
                resultadoDiv.style.display = "block";
            } else {
                resultadoDiv.className = "result-box";
                resultadoDiv.style.backgroundColor = "#fff3cd";
                resultadoDiv.style.color = "#856404";
                resultadoDiv.style.border = "1px solid #ffeeba";
                resultadoDiv.innerHTML = "⚠️ Quase lá! Dica: Ouça novamente e confira a grafia e espaços.";
                resultadoDiv.style.display = "block";
            }
        }

        function carregarCookies() {
            if(localStorage.getItem('cookiesAceitos') === 'true') return;
            fetch('cookies.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('cookieContainer').innerHTML = data;
                }).catch(err => console.log("Carregando cookies..."));
        }

        function aceitarCookies() {
            localStorage.setItem('cookiesAceitos', 'true');
            var banner = document.getElementById('cookieBanner');
            if(banner) banner.style.display = 'none';
        }

        window.onload = carregarCookies;
    </script>
</body>
</html>
