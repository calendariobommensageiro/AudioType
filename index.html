<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioType - O som que vira texto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Principal (Estilo Smartphone/Tablet) */
        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 25px;
            border: 1px solid #eef0f3;
        }

        /* Topo com a Logo */
        .header-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-logo h1 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 700;
        }

        .header-logo h1 span {
            color: #00d2ff;
        }

        .header-logo p {
            color: #6c757d;
            font-size: 12px;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Bloco de Destaque (Superior Laranja/Roxo) */
        .main-banner {
            background: linear-gradient(135deg, #4a00e0, #1a1a2e);
            color: #ffffff;
            text-align: center;
            padding: 25px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 15px rgba(74, 0, 224, 0.2);
        }

        .banner-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .banner-title {
            font-size: 20px;
            font-weight: 600;
        }

        /* Estilo dos Cards de Ação */
        .action-card {
            background-color: #ffffff;
            border: 2px solid #eef0f3;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        /* Borda lateral colorida idêntica à imagem de referência */
        .action-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 5px;
            border-radius: 0 4px 4px 0;
        }

        .card-free::before { background-color: #4a00e0; }
        .card-pro::before { background-color: #00d2ff; }

        .card-tag {
            display: inline-block;
            background-color: #eef0f3;
            color: #6c757d;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        /* Botões Verdes de Ação */
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .btn-action:hover {
            background-color: #27ae60;
        }

        /* Divisor Tracejado */
        .divider {
            border: none;
            border-top: 2px dashed #eef0f3;
            margin: 25px 0;
        }

        /* Área de Filtros e Seleção */
        .filter-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .select-custom {
            width: 100%;
            padding: 12px;
            border: 2px solid #eef0f3;
            border-radius: 12px;
            font-size: 14px;
            color: #1a1a2e;
            background-color: #ffffff;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a1a2e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .btn-filter {
            background-color: #1a1a2e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-filter:hover {
            background-color: #2d2d4d;
        }

        /* Alerta de Ajuda Azul do Rodapé */
        .info-alert {
            background-color: #e3f2fd;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            color: #0d47a1;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Logo -->
        <div class="header-logo">
            <h1>Audio<span>Type</span></h1>
            <p>O SOM QUE VIRA TEXTO</p>
        </div>

        <!-- Banner Principal -->
        <div class="main-banner">
            <div class="banner-label">Treino do Dia</div>
            <div class="banner-title">Resumo de Negócios (PT-BR)</div>
        </div>

        <!-- Card 1: Grátis -->
        <div class="action-card card-free">
            <span class="card-tag">NÍVEL 1</span>
            <button class="btn-action" onclick="alert('Iniciando player de áudio para treino...')">
                ▶ Começar Treino Grátis
            </button>
        </div>

        <!-- Card 2: Pro -->
        <div class="action-card card-pro">
            <span class="card-tag">PRO</span>
            <button class="btn-action" onclick="alert('Direcionando para a área de assinatura do Certificado...')">
                🔒 Emitir Certificado Pró
            </button>
        </div>

        <!-- Linha Tracejada -->
        <hr class="divider">

        <!-- Seção de Filtros -->
        <div class="filter-section">
            <select class="select-custom">
                <option value="">[ Nível / Velocidade ]</option>
                <option value="1">Iniciante (1.0x)</option>
                <option value="2">Intermediário (1.25x)</option>
                <option value="3">Avançado (1.5x)</option>
            </select>
            
            <select class="select-custom">
                <option value="">[ Tipo de Áudio / Contexto ]</option>
                <option value="podcast">Podcast / Entrevista</option>
                <option value="palestra">Palestra / Acadêmico</option>
                <option value="juridico">Áudio Jurídico</option>
            </select>

            <button class="btn-filter" onclick="alert('Filtrando áudios disponíveis...')">Filtrar</button>
        </div>

        <!-- Banner Informativo Azul -->
        <div class="info-alert">
            📌 Quer um áudio específico para praticar? Clique para o buscador completo.
        </div>

    </div>

</body>
</html>
