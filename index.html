<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0b0e14; padding: 40px; display: flex; justify-content: center; font-family: 'Segoe UI', sans-serif; color: #ffffff; }
        .portal-container { background: #161b22; width: 100%; max-width: 850px; border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #30363d; }
        
        /* Ajuste do Header com o Logo */
        header { display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .logo-img { max-width: 200px; margin-right: 15px; }

        .video-container { width: 100%; aspect-ratio: 9/16; max-width: 400px; margin: 20px auto; border-radius: 16px; overflow: hidden; background: #000; }
        
        .cta-box { background: #21262d; border-left: 4px solid #58a6ff; padding: 20px; border-radius: 8px; margin-top: 30px; }
        .cta-title { color: #58a6ff; font-weight: bold; margin-bottom: 10px; }
        
        textarea { width: 100%; height: 120px; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="portal-container">
        <header>
            <img src="logoaudiotype.png" alt="AudioType" class="logo-img">
            <h1 style="font-size: 24px;">| Sistema de Treino</h1>
        </header>

        <div class="video-container">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/SUA_URL_AQUI" frameborder="0" allowfullscreen></iframe>
        </div>

        <textarea placeholder="Sua transcrição profissional começa aqui..."></textarea>

        <div class="cta-box">
            <div class="cta-title">TRANSFORME SEU TEMPO EM RENDA GLOBAL</div>
            <p style="font-size: 14px; line-height: 1.6;">A transcrição profissional paga em dólar. Não é um jogo; é a sua qualificação para o mercado internacional. Treine precisão, desenvolva velocidade e prepare-se para demandas reais.</p>
        </div>
    </div>
</body>
</html>
