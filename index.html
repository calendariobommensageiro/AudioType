<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioType - O som que vira texto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0c10;
            background-image: radial-gradient(circle at 10% 20%, rgba(90, 24, 154, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 180, 216, 0.1) 0%, transparent 40%);
            color: #c5c6c7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Container Web Robusto - Sem cara de celular */
        .main-portal {
            background: rgba(26, 26, 36, 0.85);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 950px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Topo do Site */
        .portal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 25px;
            margin-bottom: 35px;
        }

        .brand h1 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand h1 span {
            color: #9d4edd;
            text-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
        }

        .brand p {
            color: #868e96;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Bloco de Destaque Premium */
        .featured-banner {
            background: linear-gradient(135deg, #240046 0%, #10002b 100%);
            border: 1px solid rgba(157, 78, 221, 0.2);
            border-radius: 14px;
            padding: 30px;
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .banner-info .tag {
            background: #3c096c;
            color: #e0aaff;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .banner-info h2 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
        }

        /* Grid de Ações - Organizado de forma horizontal para Desktop */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 35px;
        }

        .panel-card {
            background: rgba(36, 36, 47, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }

        .panel-card:hover {
            border-color: rgba(157, 78, 221, 0.4);
            transform: translateY(-2px);
        }

        .panel-meta {
            margin-bottom: 20px;
        }

        .panel-meta .level-badge {
            color: #9d4edd;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .panel-meta h3 {
            color: #ffffff;
            font-size: 18px;
            margin-top: 5px;
        }

        /* Botões Estilo Player / Plataforma Profissional */
        .btn-prime {
            background: #2ecc71;
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-prime:hover {
            background: #27ae60;
        }

        .btn-secondary {
            background: #4f5d75;
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-secondary:hover {
            background: #3d485c;
        }

        /* Divisor mais sutil */
        .panel-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 35px 0;
        }

        /* Filtros Alinhados Lado a Lado (Estilo Web) */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .select-field {
            flex: 1;
            background: #14141f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23868e96' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            transition: border-color 0.2s;
        }

        .select-field:focus {
            border-color: #9d4edd;
        }

        .btn-search {
            background: #9d4edd;
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn-search:hover {
            background: #7b2cbf;
        }

        /* Central de Ajuda do Rodapé */
        .footer-notice {
            background: rgba(157, 78, 221, 0.05);
            border: 1px dashed rgba(157, 78, 221, 0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: #e0aaff;
            font-size: 13px;
        }

        /* Ajuste para telas menores */
        @media (max-width: 768px) {
            .workspace-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; }
            .btn-search { padding: 14px; }
            .featured-banner { flex-direction: column; text-align: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-portal">
        
        <!-- Topo do Site -->
        <header class="portal-header">
            <div class="brand">
                <h1>Audio<span>Type</span></h1>
                <p>Estúdio de Áudio para Transcrição</p>
            </div>
        </header>

        <!-- Bloco de Destaque -->
        <div class="featured-banner">
            <div class="banner-info">
                <span class="tag">Treino Recomendado</span>
                <h2>Resumo de Negócios (PT-BR)</h2>
            </div>
        </div>

        <!-- Área de Trabalho (Cards Lado a Lado) -->
        <div class="workspace-grid">
            
            <!-- Painel Grátis -->
            <div class="panel-card">
                <div class="panel-meta">
                    <span class="level-badge">Acesso Livre</span>
                    <h3>Módulo de Ditado Iniciante</h3>
                </div>
                <button class="btn-prime" onclick="alert('Iniciando áudio...')">
                    ▶ Iniciar Treinamento
                </button>
            </div>

            <!-- Painel Pro -->
            <div class="panel-card">
                <div class="panel-meta">
                    <span class="level-badge">Certificação</span>
                    <h3>Área Pro e Emissão de Selo</h3>
                </div>
                <button class="btn-secondary" onclick="alert('Indo para o certificado...')">
                    🔒 Avaliação e Certificado
                </button>
            </div>

        </div>

        <hr class="panel-divider">

        <!-- Barra de Filtros Avançados Horizontal -->
        <div class="filter-bar">
            <select class="select-field">
                <option value="">[ Selecionar Velocidade do Ditado ]</option>
                <option value="1">Velocidade Normal (1.0x)</option>
                <option value="2">Velocidade Média (1.25x)</option>
                <option value="3">Velocidade Rápida (1.5x)</option>
            </select>
            
            <select class="select-field">
                <option value="">[ Contexto / Área do Áudio ]</option>
                <option value="podcast">Entrevistas & Podcasts</option>
                <option value="palestra">Palestras Acadêmicas</option>
                <option value="juridico">Termos Jurídicos</option>
            </select>

            <button class="btn-search" onclick="alert('Buscando...')">Filtrar</button>
        </div>

        <!-- Rodapé -->
        <div class="footer-notice">
            💡 Precisa de um áudio específico para concurso ou prova? Acesse nossa biblioteca completa de arquivos.
        </div>

    </div>

</body>
</html>
