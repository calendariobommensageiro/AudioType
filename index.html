<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioType - O som que vira texto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Fundo moderno com degradê sutil baseado na paleta da marca */
            background: linear-gradient(135deg, #f0f4f8 0%, #e2ebf0 100%);
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Portal Web Amplo e Elegante */
        .main-portal {
            background: #ffffff;
            width: 100%;
            max-width: 950px;
            border-radius: 24px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 45px;
            box-shadow: 0 20px 40px rgba(0, 119, 182, 0.06);
        }

        /* Topo do Site e Área do Logo */
        .portal-header {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 30px;
            margin-bottom: 35px;
        }

        .brand h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            /* Degradê no próprio texto do Logo: Azul escuro para o claro */
            background: linear-gradient(135deg, #03045e 30%, #00b4d8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            color: #6c757d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 6px;
            font-weight: 600;
        }

        /* Painel de Destaque com o degradê solicitado */
        .featured-banner {
            background: linear-gradient(135deg, #03045e 0%, #0077b6 50%, #00b4d8 100%);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 35px;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 119, 182, 0.2);
        }

        .banner-info .tag {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .banner-info h2 {
            font-size: 26px;
            font-weight: 700;
        }

        /* Grid de Exercícios Web */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 35px;
        }

        .panel-card {
            background: #f8f9fa;
            border: 2px solid #edf2f7;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .panel-card:hover {
            border-color: #0077b6;
            background: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.05);
        }

        .panel-meta {
            margin-bottom: 25px;
        }

        .panel-meta .level-badge {
            color: #0077b6;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .panel-meta h3 {
            color: #03045e;
            font-size: 20px;
            margin-top: 6px;
            font-weight: 700;
        }

        /* Botões Estilo Player Verde Esmeralda (Mantendo foco na ação positiva de play) */
        .btn-prime {
            background: #2ecc71;
            color: #ffffff;
            border: none;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-prime:hover {
            background: #27ae60;
        }

        .btn-secondary {
            background: #0077b6;
            color: #ffffff;
            border: none;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-secondary:hover {
            background: #03045e;
        }

        /* Divisor */
        .panel-divider {
            border: none;
            border-top: 2px solid #edf2f7;
            margin: 40px 0;
        }

        /* Filtros horizontais bem nítidos */
        .filter-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
        }

        .select-field {
            flex: 1;
            background: #ffffff;
            border: 2px solid #edf2f7;
            color: #2d3748;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230077b6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 16px;
            transition: border-color 0.2s;
        }

        .select-field:focus {
            border-color: #0077b6;
        }

        .btn-search {
            background: linear-gradient(135deg, #03045e 0%, #0077b6 100%);
            color: white;
            border: none;
            padding: 0 35px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn-search:hover {
            opacity: 0.9;
        }

        /* Rodapé informativo */
        .footer-notice {
            background: #e6f7ff;
            border: 1px solid #bae7ff;
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            color: #0050b3;
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .workspace-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; }
            .btn-search { padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="main-portal">
        
        <!-- Logo Principal Centralizado -->
        <header class="portal-header">
            <div class="brand">
                <h1>AudioType</h1>
                <p>O som que vira texto</p>
            </div>
        </header>

        <!-- Banner de Destaque com o Gradiente da Marca -->
        <div class="featured-banner">
            <div class="banner-info">
                <span class="tag">Treino Sugerido</span>
                <h2>Resumo de Negócios (PT-BR)</h2>
            </div>
        </div>

        <!-- Cards Corporativos Lado a Lado -->
        <div class="workspace-grid">
            
            <!-- Bloco Free -->
            <div class="panel-card">
                <div class="panel-meta">
                    <span class="level-badge">Nível Livre</span>
                    <h3>Ditado para Iniciantes</h3>
                </div>
                <button class="btn-prime" onclick="alert('Preparando áudio...')">
                    ▶ Começar Treino Grátis
                </button>
            </div>

            <!-- Bloco Pro -->
            <div class="panel-card">
                <div class="panel-meta">
                    <span class="level-badge">Premium</span>
                    <h3>Selo de Proficiência</h3>
                </div>
                <button class="btn-secondary" onclick="alert('Redirecionando para certificação...')">
                    🔒 Emitir Certificado Pró
                </button>
            </div>

        </div>

        <hr class="panel-divider">

        <!-- Seletores Horizontais Robustos -->
        <div class="filter-bar">
            <select class="select-field">
                <option value="">[ Selecionar Nível / Velocidade ]</option>
                <option value="1">Iniciante (1.0x)</option>
                <option value="2">Intermediário (1.25x)</option>
                <option value="3">Avançado (1.5x)</option>
            </select>
            
            <select class="select-field">
                <option value="">[ Tipo de Áudio / Contexto ]</option>
                <option value="podcast">Podcast / Entrevista</option>
                <option value="palestra">Palestra / Acadêmico</option>
                <option value="juridico">Áudio Jurídico</option>
            </select>

            <button class="btn-search" onclick="alert('Filtrando...')">Filtrar</button>
        </div>

        <!-- Rodapé do Site -->
        <div class="footer-notice">
            📌 Precisa praticar com um tema específico? Explore nossa central de áudios customizados.
        </div>

    </div>

</body>
</html>
