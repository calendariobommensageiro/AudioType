<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AudioType - Treino</title>
    <style>
        body { background-color: #f5f6f8; padding: 40px; display: flex; justify-content: center; }
        .portal-container { background: #ffffff; width: 100%; max-width: 850px; border-radius: 24px; padding: 40px; }

        /* O EFEITO DE RAIO/BRILHO QUE VOCÊ GOSTA */
        @keyframes brilho-raio {
            0% { box-shadow: 0 0 10px #00a8cc; }
            50% { box-shadow: 0 0 25px #00a8cc, 0 0 40px #ffffff; }
            100% { box-shadow: 0 0 10px #00a8cc; }
        }
        
        .video-container { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            border-radius: 16px; 
            overflow: hidden; 
            animation: brilho-raio 2s infinite; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <!-- Player com o efeito de raio -->
        <div class="video-container">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/SEU_ID_DO_VIDEO" frameborder="0" allowfullscreen></iframe>
        </div>
        
        <textarea style="width: 100%; height: 150px; border-radius: 8px; padding: 10px;" placeholder="Digite aqui a transcrição..."></textarea>
    </div>
</body>
</html>
