<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioType - O som que vira texto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f5f6f8;
            color: #333333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px 80px 20px;
        }

        .portal-container {
            background: #ffffff;
            width: 100%;
            max-width: 850px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef0f3;
        }

        /* Topo com suporte para a logo incorporada */
        .portal-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f5f6f8;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-container svg {
            max-width: 280px;
            height: auto;
        }

        .main-banner {
            background: linear-gradient(135deg, #003366 0%, #00a8cc 100%);
            color: #ffffff;
            padding: 35px 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .banner-tag {
            background: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .banner-title {
            font-size: 24px;
            font-weight: 700;
        }

        .cards-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .exercise-card {
            background: #fdfdfd;
            border: 1px solid #eef0f3;
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .card-tag-livre { color: #00a8cc; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .card-tag-premium { color: #006699; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a3a;
            margin-bottom: 20px;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-green { background-color: #2ecc71; color: white; }
        .btn-blue { background-color: #0077b6; color: white; }
        .btn-action:hover { opacity: 0.9; }

        .filter-section {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: center;
            margin-top: 25px;
        }

        .select-custom {
            width: 100%;
            padding: 14px;
            border: 1px solid #dcdfe4;
            border-radius: 10px;
            font-size: 14px;
            color: #495057;
            background-color: #ffffff;
        }

        .btn-filter {
            background-color: #002244;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .portal-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eef0f3;
            font-size: 12px;
        }

        .portal-footer a {
            color: #6c757d;
            text-decoration: none;
            margin: 0 10px;
        }

        .portal-footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .cards-container, .filter-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        
        <header class="portal-header">
            <div class="logo-container">
                <svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <path d="M40 50 C40 25, 75 25, 75 50" fill="none" stroke="url(#logo-grad)" stroke-width="4" stroke-linecap="round"/>
                    <path d="M35 45 H45 V55 H35 Z" fill="url(#logo-grad)"/>
                    <path d="M70 45 H80 V55 H70 Z" fill="url(#logo-grad)"/>
                    <path d="M15 50 Q 25 50, 28 40 T 34 60 T 40 50 H 55" fill="none" stroke="#1a0033" stroke-width="3" stroke-linecap="round"/>
                    <text x="95" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="#1a1a3a">Audio<tspan fill="#00b4d8">Type</tspan></text>
                    <text x="95" y="65" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#6c757d" letter-spacing="1.5">O SOM QUE VIRA TEXTO.</text>
                </svg>
            </div>
        </header>

        <div class="main-banner">
            <span class="banner-tag">Treino Sugerido</span>
            <div class="banner-title">Resumo de Negócios (PT-BR)</div>
        </div>

        <div class="cards-container">
            <div class="exercise-card">
                <div>
                    <div class="card-tag-livre">Nível Livre</div>
                    <div class="card-title">Ditado para Iniciantes</div>
                </div>
                <button class="btn-action btn-green">▶ Começar Treino Grátis</button>
            </div>

            <div class="exercise-card">
                <div>
                    <div class="card-tag-premium">Premium</div>
                    <div class="card-title">Selo de Proficiência</div>
                </div>
                <button class="btn-action btn-blue">🔒 Emitir Certificado Pró</button>
            </div>
        </div>

        <div class="filter-section">
            <select class="select-custom"><option>[ Selecionar Nível / Velocidade ]</option></select>
            <select class="select-custom"><option>[ Tipo de Áudio / Contexto ]</option></select>
            <button class="btn-filter">Filtrar</button>
        </div>

        <footer class="portal-footer">
            <a href="politicas.html#privacidade">Política de Privacidade</a> | 
            <a href="politicas.html#termos">Termos de Uso</a>
        </footer>

    </div>

    <div id="cookieContainer"></div>

    <script>
        function carregarCookies() {
            if(localStorage.getItem('cookiesAceitos') === 'true') return;
            fetch('cookies.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('cookieContainer').innerHTML = data;
                }).catch(err => {
                    // Fallback caso o arquivo demore para responder
                    console.log("Carregando cookies modulares...");
                });
        }

        function aceitarCookies() {
            localStorage.setItem('cookiesAceitos', 'true');
            var banner = document.getElementById('cookieBanner');
            if(banner) banner.style.display = 'none';
        }

        window.onload = carregarCookies;
    </script>
</body>
</html>
